<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
<title>Globe Weather App</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
<link rel="stylesheet" href="style.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Globe -->
  <script src="https://unpkg.com/globe.gl"></script>
</head>

<body>

<div id="globe"></div>

<div class="panel">
<h5>🌍 Busca cualquier ciudad</h5>

<input type="text" id="citySearch" class="form-control mb-2" placeholder="Ej: Tokyo, Sydney..." onkeypress="if(event.key==='Enter') getWeather()">

  <button class="btn btn-primary w-100" onclick="getWeather()">Ver clima</button>

  <div id="result" class="mt-3"></div>
  
  <div id="spinner" class="spinner hidden">
    <div class="spinner-inner"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
