<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Globo Clima</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
<link rel="stylesheet" href="style.css">

  <!-- Globe -->
  <script src="https://unpkg.com/globe.gl"></script>
</head>

<body>

<div id="globe"></div>

<div class="panel">
<h5>🌍 Busca cualquier ciudad</h5>

<input type="text" id="citySearch" class="form-control mb-2" placeholder="Ej: Tokyo, Sydney..." onkeypress="if(event.key==='Enter') getWeather()">

  <button class="btn btn-primary w-100" onclick="getWeather()">Ver clima</button>

  <div id="result" class="mt-3"></div>
</div>

<script src="app.js"></script>
</body>
</html>
